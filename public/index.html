<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bomberman Ultimate - AI Decision Tree & UI Merged</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* === GIỮ NGUYÊN CSS CỦA V3.2 === */
        :root {
            --bg-color: #74b9ff; --pattern-color: #0984e3; --card-bg: #ffffff; --text-color: #2d3436;
            --btn-blue: #0984e3; --btn-blue-dark: #0762ac; --btn-green: #00b894; --btn-green-dark: #008f72;
            --btn-red: #d63031; --btn-red-dark: #a11d1e; --btn-yellow: #fdcb6e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background-image: linear-gradient(45deg, var(--pattern-color) 25%, transparent 25%), linear-gradient(-45deg, var(--pattern-color) 25%, transparent 25%), linear-gradient(45deg, transparent 75%, var(--pattern-color) 75%), linear-gradient(-45deg, transparent 75%, var(--pattern-color) 75%);
            background-size: 40px 40px; background-position: 0 0, 20px 0, 20px -20px, 0px 20px;
            animation: moveBackground 4s linear infinite; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; user-select: none; -webkit-user-select: none; touch-action: none;
        }
        @keyframes moveBackground { from { background-position: 0 0, 20px 0, 20px -20px, 0px 20px; } to { background-position: 40px 40px, 60px 40px, 60px 20px, 40px 60px; } }
        .main-wrapper { display: flex; gap: 20px; align-items: flex-start; max-width: 95vw; position: relative; z-index: 1; }
        .container { position: relative; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* LOG PANEL */
        .log-panel { width: 320px; height: 580px; background: rgba(255, 255, 255, 0.95); border-radius: 12px; border: 4px solid #2d3436; box-shadow: 0 10px 20px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; margin-top: 50px; }
        .log-header { background: #2d3436; color: white; padding: 10px; font-weight: bold; text-align: center; text-transform: uppercase; border-bottom: 2px solid #b2bec3; }
        .log-content { flex: 1; padding: 10px; overflow-y: auto; font-family: 'Consolas', 'Monaco', monospace; font-size: 0.85rem; display: flex; flex-direction: column; gap: 6px; }
        .log-content::-webkit-scrollbar { width: 8px; } .log-content::-webkit-scrollbar-track { background: #dfe6e9; } .log-content::-webkit-scrollbar-thumb { background: #636e72; border-radius: 4px; }
        .log-entry { padding: 4px 8px; border-radius: 4px; border-left: 3px solid transparent; line-height: 1.4; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        .log-time { color: #636e72; font-size: 0.75rem; margin-right: 5px; }
        .log-system { background: #dfe6e9; border-left-color: #2d3436; color: #2d3436; }
        .log-info { background: #e3f2fd; border-left-color: #0984e3; color: #2980b9; }
        .log-danger { background: #ffeaa7; border-left-color: #fdcb6e; color: #d35400; }
        .log-attack { background: #ff7675; border-left-color: #d63031; color: #fff; font-weight: bold; }
        .log-item { background: #badc58; border-left-color: #6ab04c; color: #2d3436; }
        .log-death { background: #2d3436; border-left-color: #000; color: #fab1a0; }

        canvas { border: 8px solid #2d3436; border-radius: 12px; background-color: #2ecc71; box-shadow: 0 10px 20px rgba(0,0,0,0.3); display: block; image-rendering: pixelated; max-width: 100%; height: auto; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(3px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; transition: opacity 0.3s; border-radius: 12px; }
        .hidden { display: none !important; }
        .menu-card { background: var(--card-bg); padding: 30px 50px; border-radius: 25px; border: 4px solid #2d3436; box-shadow: 8px 8px 0px rgba(0,0,0,0.2); text-align: center; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); max-width: 400px; width: 90%; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        h1 { margin: 0 0 10px 0; color: #ff9f43; font-family: 'Arial Black', sans-serif; font-size: 2.8rem; text-transform: uppercase; letter-spacing: -1px; -webkit-text-stroke: 2px #2d3436; text-shadow: 4px 4px 0px #2d3436; line-height: 1.1; }
        h2 { color: #576574; margin-bottom: 20px; font-weight: 600; }
        .btn { display: block; width: 100%; margin: 15px 0; padding: 15px 20px; font-size: 1.2rem; font-weight: bold; color: white; border: none; border-radius: 12px; cursor: pointer; transition: all 0.1s; text-transform: uppercase; background-color: var(--btn-blue); box-shadow: 0 6px 0 var(--btn-blue-dark); }
        .btn:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 8px 0 var(--btn-blue-dark); }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--btn-blue-dark); }
        .btn-green { background-color: var(--btn-green); box-shadow: 0 6px 0 var(--btn-green-dark); }
        .btn-red { background-color: var(--btn-red); box-shadow: 0 6px 0 var(--btn-red-dark); }
        .control-group { margin: 15px 0; text-align: left; }
        .control-group label { font-weight: bold; color: #2d3436; display: block; margin-bottom: 5px; }
        select.btn-input { width: 100%; padding: 10px; border: 2px solid #b2bec3; border-radius: 8px; font-size: 1rem; background: #dfe6e9; color: #2d3436; cursor: pointer; }
        input[type=range] { width: 100%; cursor: pointer; }
        .hud-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 520px; margin-bottom: 10px; background: rgba(255, 255, 255, 0.9); padding: 10px 20px; border-radius: 50px; box-shadow: 0 4px 0 rgba(0,0,0,0.1); box-sizing: border-box; }
        .gear-btn { font-size: 1.5rem; cursor: pointer; background: none; border: none; transition: transform 0.3s; }
        .gear-btn:hover { transform: rotate(90deg); }
        .scoreboard { font-size: 0.9rem; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .score-item { display: flex; align-items: center; gap: 5px; background: #dfe6e9; padding: 4px 12px; border-radius: 20px; font-weight: bold; color: #2d3436; }
        #result-list { list-style: none; padding: 0; text-align: left; margin: 20px 0; }
        #result-list li { margin: 8px 0; font-size: 1.1rem; padding: 10px; background: #f1f2f6; border-radius: 8px; }

        /* Mobile Controls */
        .mobile-controls-container { display: none; position: absolute; bottom: 20px; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; flex-direction: column; justify-content: flex-end; padding-bottom: 20px; }
        .controls-row { display: flex; justify-content: space-between; width: 100%; padding: 0 40px; box-sizing: border-box; pointer-events: auto; }
        .dpad { position: relative; width: 150px; height: 150px; }
        .d-btn { position: absolute; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.3); border: 2px solid rgba(255, 255, 255, 0.5); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; touch-action: manipulation; transition: background 0.1s; }
        .d-btn:active { background: rgba(255, 255, 255, 0.6); transform: scale(0.95); }
        .d-up { top: 0; left: 50px; } .d-down { bottom: 0; left: 50px; } .d-left { top: 50px; left: 0; } .d-right { top: 50px; right: 0; }
        .action-btn { width: 90px; height: 90px; background: rgba(214, 48, 49, 0.6); border: 4px solid rgba(255, 255, 255, 0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; color: white; touch-action: manipulation; margin-bottom: 30px; }
        .action-btn:active { background: rgba(214, 48, 49, 0.9); transform: scale(0.95); }

        @media (max-width: 900px) {
            .log-panel { display: none; }
            .main-wrapper { flex-direction: column; align-items: center; gap: 0; }
            .hud-bar { width: 95%; font-size: 0.8rem; }
            h1 { font-size: 2rem; }
            body { background-size: 20px 20px; }
        }
        .device-badge { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.5); color: white; padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

<div id="device-info" class="device-badge">Detecting...</div>

<div class="main-wrapper">
    <div class="container">
        <div class="hud-bar">
            <button class="gear-btn" onclick="togglePause()">⚙️</button>
            <div class="scoreboard" id="scoreboard"></div>
        </div>
        <canvas id="gameCanvas" width="520" height="520"></canvas>

        <div id="mobile-controls" class="mobile-controls-container">
            <div class="controls-row">
                <div class="dpad">
                    <div class="d-btn d-up" data-key="w">▲</div><div class="d-btn d-left" data-key="a">◀</div>
                    <div class="d-btn d-right" data-key="d">▶</div><div class="d-btn d-down" data-key="s">▼</div>
                </div>
                <div class="action-btn" data-key="j">💣</div>
            </div>
        </div>

        <div id="main-menu" class="overlay">
            <div class="menu-card">
                <h1>BOMBERMAN<br>ULTIMATE</h1>
                <p style="color: #636e72; font-style: italic; margin-bottom: 20px;">Vượt qua mọi giới hạn nổ!</p>
                <button id="btn-pvp" class="btn btn-blue" onclick="showSetup('pvp')">🧑‍🤝‍🧑 Người vs Người</button>
                <button class="btn btn-blue" onclick="showSetup('pvai')">🤖 Người vs AI</button>
                <button class="btn btn-blue" onclick="showSetup('aivai')">⚡ AI vs AI</button>
            </div>
        </div>

        <div id="setup-menu" class="overlay hidden">
            <div class="menu-card">
                <h2 id="setup-title">Cấu hình trận đấu</h2>
                <div class="control-group">
                    <label>🗺️ Kích thước Bản đồ</label>
                    <select id="map-size-select" class="btn-input">
                        <option value="13" selected>Bình thường (13x13)</option>
                        <option value="15">Lớn (15x15)</option>
                        <option value="19">Rất lớn (19x19)</option>
                    </select>
                </div>
                <div class="control-group" id="ai-selector">
                    <label>🤖 Số lượng AI: <span id="ai-count-display" style="color:var(--btn-blue); font-weight:800; font-size:1.2rem;">1</span></label>
                    <input type="range" id="ai-slider" min="1" max="3" value="1" oninput="updateSlider()">
                </div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button class="btn btn-green" onclick="startGame()">BẮT ĐẦU</button>
                    <button class="btn btn-red" onclick="goBackMain()">QUAY LẠI</button>
                </div>
            </div>
        </div>

        <div id="pause-menu" class="overlay hidden">
            <div class="menu-card">
                <h1>TẠM DỪNG</h1>
                <button class="btn btn-green" onclick="togglePause()">TIẾP TỤC</button>
                <button class="btn btn-red" onclick="goBackMain()">VỀ MENU CHÍNH</button>
            </div>
        </div>

        <div id="game-over" class="overlay hidden">
            <div class="menu-card">
                <h1 id="result-title" style="font-size: 2.2rem;">CHIẾN THẮNG</h1>
                <ul id="result-list"></ul>
                <button class="btn btn-blue" onclick="goBackMain()">CHƠI LẠI</button>
            </div>
        </div>
    </div>

    <div class="log-panel">
        <div class="log-header">Nhật Ký Tính Toán AI</div>
        <div id="log-content" class="log-content">
            <div class="log-entry log-system">Hệ thống sẵn sàng...</div>
        </div>
    </div>
</div>

<script>
/**
 * =================================================================
 * PHẦN 1: THIẾT LẬP GIAO DIỆN & GAME LOOP (Giữ từ V3.2)
 * =================================================================
 */
const keys = {};
function detectDevice() {
    const isMobile = /android|ipad|iphone|ipod|windows phone/i.test(navigator.userAgent || navigator.vendor || window.opera);
    document.getElementById('device-info').innerHTML = isMobile ? "📱 Mode: Mobile" : "💻 Mode: PC";
    document.getElementById('mobile-controls').style.display = isMobile ? 'flex' : 'none';
    if(isMobile && document.getElementById('btn-pvp')) document.getElementById('btn-pvp').style.display = 'none';
}
function setupMobileControls() {
    document.querySelectorAll('.d-btn, .action-btn').forEach(btn => {
        const key = btn.getAttribute('data-key');
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; btn.style.opacity = '0.5'; 
            if (key === 'j') { 
    let myPlayer = entities.find(en => en.id === myPlayerId && !en.isAI); 
    if (myPlayer) {
        dropBomb(myPlayer);
        if (typeof socket !== 'undefined' && myPlayerId !== null) socket.emit('placeBomb', { playerId: myPlayerId });
    }
}
        }, {passive: false});
        btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; btn.style.opacity = '1'; }, {passive: false});
    });
}
window.addEventListener('load', () => { detectDevice(); setupMobileControls(); });

const TILE = 40; let MAP_SIZE = 13; 
const EMPTY = 0, WALL = 1, BRICK = 2, BOMB = 3, EXPLOSION = 4, ITEM = 5;
const ITEM_TYPES = { EXTRA_BOMB: 'EXTRA_BOMB', EXTRA_RADIUS: 'EXTRA_RADIUS', EXTRA_LIFE: 'EXTRA_LIFE' };
const COLORS = { p1: '#0984e3', p2: '#8e44ad', ai: '#d63031' };

const logContent = document.getElementById('log-content');
function addLog(msg, type = 'system') {
    const timeStr = new Date().toLocaleTimeString('vi-VN');
    const div = document.createElement('div');
    div.className = `log-entry log-${type}`;
    div.innerHTML = `<span class="log-time">[${timeStr}]</span>${msg}`;
    logContent.appendChild(div);
    logContent.scrollTop = logContent.scrollHeight;
}

const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
let map = [], items = {}, bombs = [], entities = [], gameMode = '', isPaused = false, gameLoopId = null, setupAI = 1;
const els = { mainMenu: document.getElementById('main-menu'), setupMenu: document.getElementById('setup-menu'), pauseMenu: document.getElementById('pause-menu'), gameOver: document.getElementById('game-over'), scoreboard: document.getElementById('scoreboard'), aiSlider: document.getElementById('ai-slider'), aiCountDisplay: document.getElementById('ai-count-display'), setupTitle: document.getElementById('setup-title'), aiSelector: document.getElementById('ai-selector'), resultTitle: document.getElementById('result-title'), resultList: document.getElementById('result-list'), mapSizeSelect: document.getElementById('map-size-select') };

// Sever//----------------------------------
const socket = io();
let myPlayerId = null; 

socket.on('init', (data) => {
    myPlayerId = data.playerId;
    addLog(`Đã kết nối server với tư cách P${myPlayerId + 1}`, 'system');

    // Nếu P2 vào sau mà P1 đã tạo trận PvP, tự động load map và vào game
    if (data.gameState && data.gameState.gameMode === 'pvp') {
        MAP_SIZE = data.gameState.mapSize;
        canvas.width = canvas.height = MAP_SIZE * TILE;
        map = data.gameState.map;
        gameMode = data.gameState.gameMode;
        bombs = []; items = {};
        
        els.mainMenu.classList.add('hidden');
        els.setupMenu.classList.add('hidden');
        
        entities = []; let pos = getStartPositions();
        entities.push(new Entity(0, false, pos[0]), new Entity(1, false, pos[1]));
        
        updateScoreboard(); isPaused = false; gameLoop();
        addLog("Đã đồng bộ map với phòng!", "info");
    }
});

// THÊM SỰ KIỆN NÀY: Nếu P2 đang đứng ở Menu mà P1 bấm Start
socket.on('gameSynced', (data) => {
    if (data.gameMode === 'pvp') {
        MAP_SIZE = data.mapSize;
        canvas.width = canvas.height = MAP_SIZE * TILE;
        map = data.map;
        gameMode = data.gameMode;
        bombs = []; items = {};
        
        els.mainMenu.classList.add('hidden');
        els.setupMenu.classList.add('hidden');
        els.gameOver.classList.add('hidden');
        
        entities = []; let pos = getStartPositions();
        entities.push(new Entity(0, false, pos[0]), new Entity(1, false, pos[1]));
        
        updateScoreboard(); isPaused = false; gameLoop();
        addLog("Đã đồng bộ map từ Host!", "info");
    }
});

socket.on('playerMoved', (data) => {
    let otherPlayer = entities.find(e => e.id === data.playerId && !e.isAI);
    if (otherPlayer) {
        otherPlayer.x = data.x;
        otherPlayer.y = data.y;
        otherPlayer.direction = data.direction;
    }
});

socket.on('bombPlaced', (data) => {
    let otherPlayer = entities.find(e => e.id === data.playerId && !e.isAI);
    if (otherPlayer) { dropBomb(otherPlayer); }
});
//-----------------------------------------------------

function showSetup(mode) { gameMode = mode; els.mainMenu.classList.add('hidden'); els.setupMenu.classList.remove('hidden'); els.setupTitle.innerText = mode === 'pvp' ? "Người vs Người" : (mode === 'pvai' ? "Người vs AI" : "AI vs AI"); els.aiSelector.style.display = mode === 'pvp' ? 'none' : 'block'; els.aiSlider.max = mode === 'pvai' ? 3 : 4; updateSlider(); }
function updateSlider() { setupAI = parseInt(els.aiSlider.value); els.aiCountDisplay.innerText = setupAI; }
function goBackMain() { cancelAnimationFrame(gameLoopId); isPaused = false; els.mainMenu.classList.remove('hidden'); els.setupMenu.classList.add('hidden'); els.pauseMenu.classList.add('hidden'); els.gameOver.classList.add('hidden'); }
function togglePause() { if (!els.mainMenu.classList.contains('hidden') || !els.setupMenu.classList.contains('hidden')) return; isPaused = !isPaused; if(isPaused) els.pauseMenu.classList.remove('hidden'); else { els.pauseMenu.classList.add('hidden'); gameLoop(); } }

function updateScoreboard() {
    els.scoreboard.innerHTML = '';
    entities.forEach(e => {
        let color = e.isAI ? COLORS.ai : (e.id === 0 ? COLORS.p1 : COLORS.p2);
        els.scoreboard.innerHTML += `<div class="score-item" style="opacity: ${e.alive?'1':'0.5'}; border-left: 5px solid ${color}"><span style="color:${color}; ${e.alive?'':'text-decoration:line-through'}">${e.name}</span><span>${e.score} <small>(❤️${e.lives})</small></span></div>`;
    });
}

function getStartPositions() { return [{x: 1, y: 1}, {x: MAP_SIZE-2, y: MAP_SIZE-2}, {x: MAP_SIZE-2, y: 1}, {x: 1, y: MAP_SIZE-2}]; }
function isSafeStart(r, c) { return getStartPositions().some(pos => (r === pos.y && Math.abs(c - pos.x) <= 1) || (c === pos.x && Math.abs(r - pos.y) <= 1)); }

class Entity {
    constructor(index, isAI, startPos) {
        this.id = index; this.name = isAI ? `AI-${index+1}` : `P${index+1}`; this.isAI = isAI;
        this.x = startPos.x; this.y = startPos.y; this.alive = true; this.score = 0; this.activeBombs = 0;
        this.maxBombs = 1; this.bombRadius = 2; this.lives = 1; this.direction = 'down'; this.lastMove = 0;
        this.delay = isAI ? 400 : 150; this.invulnerable = false; 
        this.currentState = "INIT"; // Trạng thái cho Decision Tree
    }
    pickUpItem() {
        let tx = Math.round(this.x), ty = Math.round(this.y);
        if (map[ty][tx] === ITEM) {
            let type = items[`${tx},${ty}`];
            if (type === ITEM_TYPES.EXTRA_BOMB) this.maxBombs++; if (type === ITEM_TYPES.EXTRA_RADIUS) this.bombRadius++; if (type === ITEM_TYPES.EXTRA_LIFE) this.lives++;
            this.score += 50; map[ty][tx] = EMPTY; delete items[`${tx},${ty}`]; updateScoreboard();
        }
    }
}

function startGame() {
    logContent.innerHTML = ''; addLog("=== BẮT ĐẦU TRẬN ĐẤU MỚI ===", "system");
    MAP_SIZE = parseInt(els.mapSizeSelect.value); canvas.width = canvas.height = MAP_SIZE * TILE;
    els.setupMenu.classList.add('hidden'); els.gameOver.classList.add('hidden');
    
    map = []; bombs = []; items = {};
    for (let r = 0; r < MAP_SIZE; r++) { map[r] = []; for (let c = 0; c < MAP_SIZE; c++) map[r][c] = (r===0||r===MAP_SIZE-1||c===0||c===MAP_SIZE-1||(r%2===0&&c%2===0)) ? WALL : (Math.random() > 0.7 && !isSafeStart(r,c) ? BRICK : EMPTY); }
    
    entities = []; let pos = getStartPositions();
    if (gameMode === 'pvp') { entities.push(new Entity(0, false, pos[0]), new Entity(1, false, pos[1])); } 
    else if (gameMode === 'pvai') { entities.push(new Entity(0, false, pos[0])); for(let i=0; i<setupAI; i++) entities.push(new Entity(i+1, true, pos[i+1])); } 
    else { for(let i=0; i<setupAI; i++) entities.push(new Entity(i, true, pos[i])); }
    if (gameMode === 'pvp') {
        socket.emit('syncGame', { map: map, mapSize: MAP_SIZE, gameMode: gameMode });
    }
    updateScoreboard(); isPaused = false; gameLoop();
}

function isOccupied(x, y, selfId) { return entities.some(e => e.alive && e.id !== selfId && Math.round(e.x) === x && Math.round(e.y) === y); }
function isValidMove(x, y, selfId) { return !(x < 0 || x >= MAP_SIZE || y < 0 || y >= MAP_SIZE || map[y][x] === WALL || map[y][x] === BRICK || map[y][x] === BOMB || isOccupied(x, y, selfId)); }

function dropBomb(entity) {
    if (!entity.alive || entity.activeBombs >= entity.maxBombs) return;
    let bx = Math.round(entity.x), by = Math.round(entity.y);
    if (map[by][bx] === EMPTY || map[by][bx] === EXPLOSION || map[by][bx] === ITEM) {
        entity.activeBombs++;
        let b = { x: bx, y: by, ownerId: entity.id, time: 2000 }; bombs.push(b); map[by][bx] = BOMB;
        setTimeout(() => explodeBomb(b), b.time);
    }
}

function explodeBomb(b) {
    if (!bombs.includes(b)) return;
    bombs = bombs.filter(i => i !== b);
    let owner = entities.find(e => e.id === b.ownerId); if (owner) owner.activeBombs--;
    createExplosion(b.x, b.y, owner);
    [[0,1], [0,-1], [1,0], [-1,0]].forEach(d => {
        for (let i = 1; i <= (owner?owner.bombRadius:2); i++) {
            let nx = b.x + d[0]*i, ny = b.y + d[1]*i;
            if (nx < 0 || nx >= MAP_SIZE || ny < 0 || ny >= MAP_SIZE || map[ny][nx] === WALL) break;
            if (map[ny][nx] === BRICK) { if (owner) owner.score += 10; createExplosion(nx, ny, owner); break; }
            let ob = bombs.find(x => x.x === nx && x.y === ny);
            if (ob) { explodeBomb(ob); break; }
            createExplosion(nx, ny, owner);
        }
    });
    updateScoreboard();
}

function createExplosion(x, y, killer) {
    entities.forEach(e => {
        if (e.alive && Math.round(e.x) === x && Math.round(e.y) === y && !e.invulnerable) {
            e.lives--;
            if (e.lives <= 0) {
                e.alive = false; addLog(`💀 <b>${e.name}</b> bị tiêu diệt!`, "death");
                if (killer && killer.id !== e.id && !(gameMode === 'pvai' && killer.isAI && e.isAI)) killer.score += 100;
            } else { e.invulnerable = true; setTimeout(() => e.invulnerable = false, 2000); }
            checkWinCondition();
        }
    });
    let oldType = map[y][x]; map[y][x] = EXPLOSION;
    let dropItem = oldType === BRICK && Math.random() < 0.5 ? (Math.random() < 0.33 ? ITEM_TYPES.EXTRA_BOMB : (Math.random() < 0.66 ? ITEM_TYPES.EXTRA_RADIUS : ITEM_TYPES.EXTRA_LIFE)) : null;
    setTimeout(() => { if (map[y][x] === EXPLOSION) { if (dropItem) { map[y][x] = ITEM; items[`${x},${y}`] = dropItem; } else map[y][x] = EMPTY; } }, 500);
}

function checkWinCondition() {
    let alive = entities.filter(e => e.alive);
    if (gameMode === 'pvai') {
        if (alive.filter(e => !e.isAI).length === 0) setTimeout(() => showGameOver(alive.filter(e => e.isAI).length > 0 ? "AI THẮNG!" : "HÒA!"), 1000);
        else if (alive.filter(e => e.isAI).length === 0) setTimeout(() => showGameOver("NGƯỜI CHƠI THẮNG!"), 1000);
    } else if (alive.length <= 1) setTimeout(() => showGameOver(alive.length === 1 ? `${alive[0].name} THẮNG!` : "HÒA!"), 1000);
}

function showGameOver(title) {
    cancelAnimationFrame(gameLoopId); isPaused = true; els.resultTitle.innerText = title;
    els.resultList.innerHTML = [...entities].sort((a,b) => b.score - a.score).map(e => `<li><span style="color:${e.isAI?COLORS.ai:(e.id==0?COLORS.p1:COLORS.p2)}">${e.name}</span>: ${e.score} pts ${e.alive?'🏆':'💀'}</li>`).join('');
    els.gameOver.classList.remove('hidden');
}

window.addEventListener('keydown', e => { 
    keys[e.key] = true; 
    if (!isPaused && e.key.toLowerCase() === 'j') { 
        let myPlayer = entities.find(en => en.id === myPlayerId && !en.isAI); 
        if (myPlayer) {
            dropBomb(myPlayer);
            if (typeof socket !== 'undefined' && myPlayerId !== null) {
                socket.emit('placeBomb', { playerId: myPlayerId });
            }
        } 
    }
});
window.addEventListener('keyup', e => keys[e.key] = false);

function handleInput() {
    let now = Date.now();
    let myPlayer = entities.find(e => e.id === myPlayerId && !e.isAI && e.alive);
    if (myPlayer) {
        myPlayer.pickUpItem();
        if (now - myPlayer.lastMove > myPlayer.delay) {
            let nx = myPlayer.x, ny = myPlayer.y, moved = false;
            if (keys['w']) { ny--; myPlayer.direction = 'up'; moved = true; } 
            else if (keys['s']) { ny++; myPlayer.direction = 'down'; moved = true; }
            else if (keys['a']) { nx--; myPlayer.direction = 'left'; moved = true; } 
            else if (keys['d']) { nx++; myPlayer.direction = 'right'; moved = true; }
            
            if (moved && isValidMove(nx, ny, myPlayer.id)) { 
                myPlayer.x = nx; myPlayer.y = ny; myPlayer.lastMove = now;
                // Phát tín hiệu lên Server
                socket.emit('playerMove', { x: myPlayer.x, y: myPlayer.y, direction: myPlayer.direction });
            }
        }
    }
}

/**
 * =================================================================
 * PHẦN 2: LÕI THUẬT TOÁN AI CÂY QUYẾT ĐỊNH (Tích hợp từ V3.3 Fix)
 * =================================================================
 */

// 1. Dựng lại Danger Map tương thích với cấu trúc Map của V3.2
function calculateDangerMap() {
    let dMap = Array.from({length: MAP_SIZE}, () => Array(MAP_SIZE).fill(false));
    
    // Đánh dấu các vùng nổ hiện tại
    for(let r=0; r<MAP_SIZE; r++) for(let c=0; c<MAP_SIZE; c++) if(map[r][c] === EXPLOSION) dMap[r][c] = true;
    
    // Dự đoán vùng nổ của bom đang chờ
    bombs.forEach(b => {
        dMap[b.y][b.x] = true;
        let owner = entities.find(e => e.id === b.ownerId);
        let power = owner ? owner.bombRadius : 2;
        [[0, -1], [0, 1], [-1, 0], [1, 0]].forEach(d => {
            for (let i = 1; i <= power; i++) {
                let ex = b.x + d[0] * i, ey = b.y + d[1] * i;
                if (ex < 0 || ex >= MAP_SIZE || ey < 0 || ey >= MAP_SIZE || map[ey][ex] === WALL) break;
                dMap[ey][ex] = true;
                if (map[ey][ex] === BRICK) break;
            }
        });
    });
    return dMap;
}

// 2. BFS Tìm đường an toàn (Evade) hoặc Tìm Mục tiêu (Target/Brick)
function bfsSearch(startX, startY, targetType, dangerMap, selfId) {
    let queue = [{x: startX, y: startY, path: []}];
    let visited = Array.from({length: MAP_SIZE}, () => Array(MAP_SIZE).fill(false));
    visited[startY][startX] = true;

    while (queue.length > 0) {
        let curr = queue.shift();

        // Điều kiện dừng theo từng mục tiêu
        if (targetType === "SAFE" && !dangerMap[curr.y][curr.x]) return curr.path;
        if (targetType === "BRICK") {
            const adjs = [[0, -1], [0, 1], [-1, 0], [1, 0]];
            for(let a of adjs) {
                let ax = curr.x + a[0], ay = curr.y + a[1];
                if (ax >= 0 && ax < MAP_SIZE && ay >= 0 && ay < MAP_SIZE && map[ay][ax] === BRICK) {
                    return { path: curr.path, isAdjacent: curr.path.length === 0 };
                }
            }
        }
        if (targetType === "PLAYER") {
            let target = entities.find(e => (!e.isAI || gameMode==='aivai') && e.id !== selfId && e.alive && Math.round(e.x) === curr.x && Math.round(e.y) === curr.y);
            if (target) return curr.path;
        }

        if (curr.path.length > 12) continue; // Giới hạn độ sâu để tối ưu

        [[0, -1], [0, 1], [-1, 0], [1, 0]].forEach(d => {
            let nx = curr.x + d[0], ny = curr.y + d[1];
            if (nx >= 0 && nx < MAP_SIZE && ny >= 0 && ny < MAP_SIZE && !visited[ny][nx]) {
                let tile = map[ny][nx];
                if (tile !== WALL && tile !== BRICK && tile !== BOMB && !isOccupied(nx, ny, selfId)) {
                    // Nếu tìm đường an toàn, có thể đi xuyên vùng danger (để thoát), nhưng nếu tìm mục tiêu thì cấm đi vào danger
                    if (targetType === "SAFE" || (!dangerMap[ny][nx])) {
                        visited[ny][nx] = true;
                        queue.push({x: nx, y: ny, path: [...curr.path, {x: nx, y: ny}]});
                    }
                }
            }
        });
    }
    return null;
}

function canAttackPlayer(ai, dangerMap) {
    if (ai.activeBombs >= ai.maxBombs) return false;
    let ax = Math.round(ai.x), ay = Math.round(ai.y);
    
    let targets = entities.filter(e => e.alive && e.id !== ai.id && (!e.isAI || gameMode === 'aivai'));
    for (let p of targets) {
        let px = Math.round(p.x), py = Math.round(p.y);
        if (ax === px && Math.abs(ay - py) <= ai.bombRadius) {
            let clear = true;
            for (let y = Math.min(ay, py) + 1; y < Math.max(ay, py); y++) if (map[y][ax] !== EMPTY && map[y][ax] !== ITEM) clear = false;
            if (clear) return true;
        }
        if (ay === py && Math.abs(ax - px) <= ai.bombRadius) {
            let clear = true;
            for (let x = Math.min(ax, px) + 1; x < Math.max(ax, px); x++) if (map[ay][x] !== EMPTY && map[ay][x] !== ITEM) clear = false;
            if (clear) return true;
        }
    }
    return false;
}

// Hàm cập nhật trạng thái UI và in Log
function setAIState(ai, newState, logType) {
    if (ai.currentState !== newState) {
        ai.currentState = newState;
        addLog(`[${ai.name}] -> ${newState}`, logType);
    }
}

// 3. Vòng lặp chính của Cây Quyết Định (DECISION TREE)
function runAI_DecisionTree(ai) {
    ai.pickUpItem();
    let ax = Math.round(ai.x), ay = Math.round(ai.y);
    let dangerMap = calculateDangerMap();

    // NHÁNH 1: SINH TỒN (Né Bom)
    if (dangerMap[ay][ax]) {
        setAIState(ai, "NÉ TRÁNH NGUY HIỂM", "danger");
        let safePath = bfsSearch(ax, ay, "SAFE", dangerMap, ai.id);
        if (safePath && safePath.length > 0) { ai.x = safePath[0].x; ai.y = safePath[0].y; }
        return;
    }

    // NHÁNH 2: TẤN CÔNG
    if (canAttackPlayer(ai, dangerMap)) {
        // Look-ahead: Nếu đặt bom xong có đường lui không?
        dangerMap[ay][ax] = true; 
        let escapePath = bfsSearch(ax, ay, "SAFE", dangerMap, ai.id);
        dangerMap[ay][ax] = false;

        if (escapePath) {
            setAIState(ai, "ĐẶT BOM TẤN CÔNG", "attack");
            dropBomb(ai);
            return;
        }
    }

    // NHÁNH 3: PHÁ TƯỜNG (Farming)
    let pathToBrick = bfsSearch(ax, ay, "BRICK", dangerMap, ai.id);
    if (pathToBrick) {
        if (pathToBrick.isAdjacent) {
            // Đã đứng cạnh gạch
            dangerMap[ay][ax] = true;
            let escapePath = bfsSearch(ax, ay, "SAFE", dangerMap, ai.id);
            dangerMap[ay][ax] = false;

            if (escapePath && ai.activeBombs < ai.maxBombs) {
                setAIState(ai, "PHÁ GẠCH MỞ ĐƯỜNG", "info");
                dropBomb(ai);
            } else {
                setAIState(ai, "CHỜ ĐỢI AN TOÀN", "system"); // Hết bom hoặc không lối thoát
            }
        } else {
            setAIState(ai, "TÌM GẠCH ĐỂ PHÁ", "system");
            ai.x = pathToBrick.path[0].x; ai.y = pathToBrick.path[0].y;
        }
        return;
    }

    // NHÁNH 4: TRUY TÌM VÀ ĐI TUẦN
    let pathToPlayer = bfsSearch(ax, ay, "PLAYER", dangerMap, ai.id);
    if (pathToPlayer && pathToPlayer.length > 0) {
        setAIState(ai, "TRUY ĐUỔI MỤC TIÊU", "attack");
        ai.x = pathToPlayer[0].x; ai.y = pathToPlayer[0].y;
    } else {
        setAIState(ai, "ĐI TUẦN NGẪU NHIÊN", "system");
        let safeDirs = [[0, -1], [0, 1], [-1, 0], [1, 0]].filter(d => {
            let nx = ax + d[0], ny = ay + d[1];
            return nx >= 0 && nx < MAP_SIZE && ny >= 0 && ny < MAP_SIZE && 
                   (map[ny][nx] === EMPTY || map[ny][nx] === ITEM) && 
                   !dangerMap[ny][nx] && !isOccupied(nx, ny, ai.id);
        });
        if (safeDirs.length > 0) {
            let rand = safeDirs[Math.floor(Math.random() * safeDirs.length)];
            ai.x = ax + rand[0]; ai.y = ay + rand[1];
        }
    }
}

function updateAI() {
    let now = Date.now();
    entities.forEach(e => {
        if (e.isAI && e.alive && now - e.lastMove >= e.delay) {
            runAI_DecisionTree(e);
            e.lastMove = now;
        }
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let r = 0; r < MAP_SIZE; r++) {
        for (let c = 0; c < MAP_SIZE; c++) {
            let x = c * TILE, y = r * TILE;
            if (map[r][c] === WALL) { ctx.fillStyle = "#2d3436"; ctx.fillRect(x, y, TILE, TILE); ctx.fillStyle = "#636e72"; ctx.fillRect(x+4, y+4, TILE-8, TILE-8); ctx.strokeStyle = "#000"; ctx.strokeRect(x,y,TILE,TILE); } 
            else if (map[r][c] === BRICK) { ctx.fillStyle = "#e67e22"; ctx.fillRect(x, y, TILE, TILE); ctx.fillStyle = "#d35400"; ctx.fillRect(x+5, y+5, TILE-10, TILE-10); ctx.fillStyle = "#8e44ad"; ctx.fillRect(x, y+18, TILE, 4); ctx.fillRect(x+18, y, 4, 18); ctx.fillRect(x+18, y+22, 4, 18); } 
            else if (map[r][c] === BOMB) { let bx = x+TILE/2, by = y+TILE/2; ctx.fillStyle="#000"; ctx.beginPath(); ctx.arc(bx, by+2, 16, 0, Math.PI*2); ctx.fill(); ctx.fillStyle="#2d3436"; ctx.beginPath(); ctx.arc(bx, by, 16, 0, Math.PI*2); ctx.fill(); ctx.fillStyle=(Date.now()%500<250)?"#ff7675":"#d63031"; ctx.beginPath(); ctx.arc(bx, by, 10, 0, Math.PI*2); ctx.fill(); ctx.fillStyle="#fab1a0"; ctx.fillRect(bx-2, by-22, 4, 6); } 
            else if (map[r][c] === EXPLOSION) { let grd = ctx.createRadialGradient(x+20, y+20, 5, x+20, y+20, 20); grd.addColorStop(0,"#ffeaa7"); grd.addColorStop(0.5,"#e17055"); grd.addColorStop(1,"#d63031"); ctx.fillStyle=grd; ctx.fillRect(x,y,TILE,TILE); } 
            else if (map[r][c] === ITEM) { let type = items[`${c},${r}`], cx = x+20, cy = y+20; ctx.fillStyle="rgba(255,255,255,0.9)"; ctx.beginPath(); ctx.arc(cx,cy,16,0,Math.PI*2); ctx.fill(); ctx.strokeStyle="#0984e3"; ctx.lineWidth=2; ctx.stroke(); ctx.font="20px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillStyle=type===ITEM_TYPES.EXTRA_BOMB?"#2d3436":"#d63031"; ctx.fillText(type===ITEM_TYPES.EXTRA_BOMB?"💣":type===ITEM_TYPES.EXTRA_RADIUS?"🔥":"❤️", cx, cy); }
        }
    }
    entities.forEach(e => {
        if (!e.alive || (e.invulnerable && Date.now() % 200 < 100)) return;
        let cx = e.x * TILE + 20, cy = e.y * TILE + 20;
        ctx.fillStyle = e.isAI ? COLORS.ai : (e.id === 0 ? COLORS.p1 : COLORS.p2);
        ctx.beginPath(); ctx.ellipse(cx, cy+14, 12, 6, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle="white"; let ox=e.direction==='left'?-6:e.direction==='right'?6:0, oy=e.direction==='up'?-6:e.direction==='down'?2:0;
        if(e.direction!=='up') { ctx.beginPath(); ctx.arc(cx-5+ox, cy-6+oy, 4, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(cx+5+ox, cy-6+oy, 4, 0, Math.PI*2); ctx.fill(); ctx.fillStyle="black"; ctx.beginPath(); ctx.arc(cx-4+ox, cy-6+oy, 1.5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(cx+6+ox, cy-6+oy, 1.5, 0, Math.PI*2); ctx.fill(); }
        ctx.fillStyle="white"; ctx.font="bold 11px Arial"; ctx.textAlign="center"; ctx.shadowColor="black"; ctx.shadowBlur=2; ctx.fillText(e.isAI?"AI":e.id===0?"P1":"P2", cx, cy-18); ctx.shadowBlur=0;
    });
}

function gameLoop() { if (!isPaused) { handleInput(); updateAI(); draw(); gameLoopId = requestAnimationFrame(gameLoop); } }
els.mainMenu.classList.remove('hidden');
</script>
